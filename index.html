<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mindent vagy semmit!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
    <header>
        <h1 style="text-align: center;" id="title">Mindent vagy semmit!</h1>
        <div class="controls">
            <!-- Team selector added here -->

            <button hidden="hidden" id="renameBtn" title="Rename labels">Rename All</button>
            <button hidden="hidden" id="shuffleBtn" title="Randomize animation">Random animation</button>
            <button hidden="hidden" id="resetBtn" title="Reset all boxes">Reset</button>
            <button id="undoBtn" title="Undo last click">Undo</button>
        </div>
    </header>
    <div class="column-titles" style="display:grid;grid-template-columns:repeat(7,1fr);gap:var(--gap);padding:0 2vw 0.5vw 2vw;">
        <h2 style="margin:0;font-size:1.5vw;text-align:center;font-weight:600;">Emojit vagy <br> semmit!</h2>
        <h2 style="margin:0;font-size:1.5vw;text-align:center;font-weight:600;">Filmet vagy <br> semmit!</h2>
        <h2 style="margin:0;font-size:1.5vw;text-align:center;font-weight:600;">Hol van vagy <br> sehol?</h2>
        <h2 style="margin:0;font-size:1.5vw;text-align:center;font-weight:600;">Zászlót vagy <br> semmit!</h2>
        <h2 style="margin:0;font-size:1.5vw;text-align:center;font-weight:600;">Zenét vagy <br> semmit! Zsákbamacska</h2>
        <h2 style="margin:0;font-size:1.5vw;text-align:center;font-weight:600;">Zenét vagy <br> semmit! <br> WGM</h2>
        <h2 style="margin:0;font-size:1.5vw;text-align:center;font-weight:600;">Zenét vagy <br> semmit! Kedvencek </h2>
    </div>
    <div id="grid" class="grid" role="grid" aria-label="7 by 5 box grid"></div>

</div>
<script src="main.js"></script>
</body>
</html>
