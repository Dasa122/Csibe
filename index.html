<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mindent vagy semmit!</title>
    <style>
        :root{
            --bg:#e0f2ff;
            --card:#ffffff;
            --accent:#0284c7;
            --glass: rgba(0,0,0,0.04);
            --gap:0.5vw;
        }
        *{box-sizing:border-box}
        html,body{
            height:100%;
            width:100%;
            margin:0;
            padding:0;
            font-family:Inter,system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial;
            min-height:100vh;
            min-width:100vw;
            /* One big gradient for the whole page */
        }
        body{
            background: linear-gradient(45deg,rgba(17, 177, 240, 1) 0%, rgba(83, 237, 211, 1) 100%);
            color:#0f172a;
            width:100vw;
            height:100vh;
            min-height:100vh;
            min-width:100vw;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:0;
            overflow:hidden;
            /* Remove background here */
        }
        .app{
            width:100vw;
            height:100vh;
            max-width:100vw;
            max-height:100vh;
            /* Remove background from .app */
            background: none;
            border-radius:0;
            padding:0;
            box-shadow:none;
            display:flex;
            flex-direction:column;
        }
        header{
            display:flex;
            align-items:center;
            justify-content:space-between;
            margin:0;
            padding:1vw 2vw 0 2vw;
            min-height:6vh;
        }
        h1{font-size:2.5vw;margin:0}
        .controls{display:flex;gap:0.5vw;align-items:center} /* smaller gap */
        .controls button{
            background:var(--glass);
            border:1px solid rgba(0,0,0,0.08);
            color:inherit;
            padding:0.7vw 1vw;
            border-radius:1vw;
            cursor:pointer;
            font-size:2vw; /* bigger inner text */
        }
        .column-titles{
            display:grid;
            grid-template-columns:repeat(5,1fr);
            gap:var(--gap);
            padding:0 2vw 0.5vw 2vw;
            min-height:4vh;
        }
        .column-titles h2{
            margin:0;
            font-size:1.5vw;
            text-align:center;
            font-weight:600;
            word-break:break-word;
        }
        .grid{
            flex:1 1 auto;
            display:grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: var(--gap);
            padding:2vw;
            background: rgba(255,255,255,0.6);
            border-radius:1vw;
            width:100%;
            height:100%;
            min-height:0;
            min-width:0;
            box-sizing:border-box;
        }
        .box{
            background: #a6d0ec8c;
            border-radius:2vw;
            border: 1px solid rgba(0,0,0,0.08);
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            position:relative;
            overflow:hidden;
            padding:0.5vw;
            user-select:none;
            outline:none;
            transition:transform 220ms cubic-bezier(.2,.9,.2,1),box-shadow 220ms;
            min-height:0;
            min-width:0;
            font-size:2vw;
        }
        .box:active{transform:scale(0.97)}
        .box .label{font-size:1.5vw;opacity:0.85}
        .box.clicked{
            animation: pop 540ms cubic-bezier(.2,.9,.2,1);
            box-shadow: 0 1vw 3vw rgba(2,132,199,0.4), 0 0.5vw 1.5vw rgba(2,132,199,0.2) inset;
            transform: translateY(-0.5vw) scale(1.02);
        }
        @keyframes pop{
            0%{transform: translateY(0) scale(1);}
            45%{transform: translateY(-0.7vw) scale(1.06);}
            100%{transform: translateY(0) scale(1);}
        }
        .ripple{
            position:absolute;
            border-radius:50%;
            transform:scale(0);
            pointer-events:none;
            opacity:0.7;
            animation:ripple 700ms cubic-bezier(.2,.9,.2,1);
            background: radial-gradient(circle at center, rgba(2,132,199,0.85), rgba(2,132,199,0.28) 30%, rgba(2,132,199,0.12) 60%, transparent 61%);
            mix-blend-mode:multiply;
        }
        @keyframes ripple{
            to{transform:scale(12);opacity:0}
        }
        .toast{
            position:absolute;
            left:50%;
            transform:translateX(-50%);
            bottom:1vw;
            background:rgba(255,255,255,0.7);
            padding:0.5vw 1vw;
            border-radius:999px;
            font-size:1vw;
            border:1px solid rgba(0,0,0,0.08)
        }
        .footer{
            display:flex;
            align-items:center;
            justify-content:space-between;
            margin:0;
            padding:0 2vw 1vw 2vw;
            min-height:4vh;
        }
        .info{font-size:1.2vw;opacity:0.9}
        @media (max-width:720px){
            .grid{gap:2vw;grid-template-columns:repeat(3,1fr)}
            .box{font-size:4vw}
            .column-titles h2{font-size:3vw;}
            h1{font-size:4vw;}
            .controls button{font-size:3vw;}
        }
    </style>
</head>
<body>
<div class="app">
    <header>
        <h1 style="text-align: center;" id="title">Mindent vagy semmit!</h1>
        <div class="controls">
            <!-- Team selector added here -->
            <select id="teamSelector" title="Select team" style="font-size:1.5vw;padding:0.3vw 1vw;border-radius:1vw;">
                <option value="0">Team 1</option>
                <option value="1">Team 2</option>
                <option value="2">Team 3</option>
                <option value="3">Team 4</option>
                <option value="4">Team 5</option>
            </select>
            <button hidden="hidden" id="renameBtn" title="Rename labels">Rename All</button>
            <button hidden="hidden" id="shuffleBtn" title="Randomize animation">Random animation</button>
            <button hidden="hidden" id="resetBtn" title="Reset all boxes">Reset</button>
            <button id="undoBtn" title="Undo last click">Undo</button>
        </div>
    </header>
    <div class="column-titles" style="display:grid;grid-template-columns:repeat(5,1fr);gap:var(--gap);padding:0 2vw 0.5vw 2vw;">
        <h2 style="margin:0;font-size:1.5vw;text-align:center;font-weight:600;">Emojit vagy semmit!</h2>
        <h2 style="margin:0;font-size:1.5vw;text-align:center;font-weight:600;">Filmet vagy semmit!</h2>
        <h2 style="margin:0;font-size:1.5vw;text-align:center;font-weight:600;">Hol van vagy sehol?</h2>
        <h2 style="margin:0;font-size:1.5vw;text-align:center;font-weight:600;">Zászlót vagy semmit!</h2>
        <h2 style="margin:0;font-size:1.5vw;text-align:center;font-weight:600;">Zenét vagy semmit!</h2>
    </div>
    <div id="grid" class="grid" role="grid" aria-label="7 by 5 box grid"></div>
    <div class="footer">
        <div hidden class="info" id="lastClicked">Last clicked: —</div>
    </div>
</div>
<script>
    (function(){
        const rows = 7, cols = 5; // Changed to 7 rows, 5 columns
        const grid = document.getElementById('grid');
        const lastClicked = document.getElementById('lastClicked');
        const resetBtn = document.getElementById('resetBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const renameBtn = document.getElementById('renameBtn');
        const undoBtn = document.getElementById('undoBtn');
        const teamSelector = document.getElementById('teamSelector');

        // Undo stack: each item is { box, label, wasClicked, lastClickedText }
        const undoStack = [];

        // Create the grid
        for(let r=1; r<=rows; r++){
            for(let c=1; c<=cols; c++){
                const btn = document.createElement('button');
                btn.className = 'box';
                btn.type = 'button';
                btn.setAttribute('role','gridcell');
                btn.dataset.row = r; btn.dataset.col = c;
                btn.innerHTML = `<span class="label">${r},${c}</span>`;

                btn.addEventListener('click', async (ev)=>{
                    storeUndo(btn);
                    animateBox(btn, ev);
                    // Add points to selected team
                    const teamIdx = getSelectedTeam();
                    const pts = getPointsFromBox(btn);
                    if (pts > 0) {
                        await addPointsToTeam(teamIdx, pts);
                    }
                });

                // right-click to rename individual box
                btn.addEventListener('contextmenu', (ev)=>{
                    ev.preventDefault();
                    const label = btn.querySelector('.label');
                    const newName = prompt('Enter new name for this box:', label.textContent);
                    if(newName){
                        label.textContent = newName;
                    }
                });

                grid.appendChild(btn);
            }
        }

        function storeUndo(box) {
            // Keep max 3 in stack
            if (undoStack.length >= 3) undoStack.shift();
            undoStack.push({
                box: box,
                label: box.querySelector('.label').textContent,
                wasClicked: box.classList.contains('clicked'),
                lastClickedText: lastClicked.textContent
            });
        }

        function animateBox(box, ev){
            lastClicked.textContent = `Last clicked: ${box.querySelector('.label').textContent}`;
            box.classList.remove('clicked');
            void box.offsetWidth;
            box.classList.add('clicked');
            const rect = box.getBoundingClientRect();
            const x = (ev && typeof ev.clientX === "number") ? (ev.clientX - rect.left) : (rect.width/2);
            const y = (ev && typeof ev.clientY === "number") ? (ev.clientY - rect.top) : (rect.height/2);
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const size = Math.max(rect.width, rect.height) * 2;
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (x - size/2) + 'px';
            ripple.style.top = (y - size/2) + 'px';
            box.appendChild(ripple);
            box.style.background = 'linear-gradient(180deg, rgba(2,132,199,0.14), rgba(2,132,199,0.06))';
            setTimeout(()=>{ box.style.background = ''; }, 420);
            setTimeout(()=>{ ripple.remove(); }, 800);
        }

        // Helper: get selected team index
        function getSelectedTeam() {
            return parseInt(teamSelector.value, 10);
        }

        // Helper: get points value from box label (assumes label is a number)
        function getPointsFromBox(box) {
            const label = box.querySelector('.label').textContent;
            const pts = parseInt(label, 10);
            return isNaN(pts) ? 0 : pts;
        }

        // Update: when a box is clicked, add points to selected team via backend
        async function addPointsToTeam(teamIndex, points) {
            // Call backend API (assumes backend running at /api/add_points)
            try {
                await fetch('/api/add_points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ team_index: teamIndex, points: points })
                });
            } catch (e) {
                // Optionally show error
                console.error('Failed to update backend:', e);
            }
        }

        // Undo logic
        undoBtn.addEventListener('click', ()=>{
            if(undoStack.length > 0) {
                const undo = undoStack.pop();
                const box = undo.box;
                // Remove click effect if it was added
                box.classList.remove('clicked');
                box.style.background = '';
                // Restore label if changed (optional: comment out if you do not wish to undo renames)
                // box.querySelector('.label').textContent = undo.label;
                // Restore lastClicked message
                lastClicked.textContent = undo.lastClickedText || 'Last clicked: —';
            }
        });

        // Reset disables undo
        resetBtn && resetBtn.addEventListener('click', ()=>{
            document.querySelectorAll('.box').forEach(b=>{
                b.classList.remove('clicked');
                b.style.background = '';
                b.querySelector('.label').textContent = `${b.dataset.row},${b.dataset.col}`;
            });
            lastClicked.textContent = 'Last clicked: —';
            undoStack.length = 0;
        });

        // Keyboard support
        grid.addEventListener('keydown', (e)=>{
            if(e.key === 'Enter' || e.key === ' '){
                const target = document.activeElement;
                if(target && target.classList.contains('box')){
                    e.preventDefault();
                    storeUndo(target);
                    const ev = { clientX: target.getBoundingClientRect().left + target.offsetWidth/2, clientY: target.getBoundingClientRect().top + target.offsetHeight/2 };
                    animateBox(target, ev);
                }
            }
        });

        document.querySelectorAll('.box').forEach(b=>b.tabIndex = 0);

        // Shuffle, rename handlers remain unchanged...
        let randomMode = false;
        shuffleBtn && shuffleBtn.addEventListener('click', ()=>{
            randomMode = !randomMode;
            if(randomMode){
                shuffleBtn.textContent = 'Random: ON';
                window._randomInterval = setInterval(()=>{
                    const boxes = document.querySelectorAll('.box');
                    const i = Math.floor(Math.random()*boxes.length);
                    const box = boxes[i];
                    storeUndo(box);
                    const ev = { clientX: box.getBoundingClientRect().left + box.offsetWidth/2, clientY: box.getBoundingClientRect().top + box.offsetHeight/2 };
                    animateBox(box, ev);
                }, 600);
            } else {
                shuffleBtn.textContent = 'Random animation';
                clearInterval(window._randomInterval);
            }
        });

        renameBtn && renameBtn.addEventListener('click', ()=>{
            const newName = prompt('Enter new base name for all boxes:', 'Box');
            if(newName){
                document.querySelectorAll('.box .label').forEach((lbl, idx)=>{
                    lbl.textContent = `${newName} ${idx+1}`;
                });
                document.getElementById('title').textContent = `${newName} Grid`;
            }
        });
        // Rename top row (row=1) to 100 and bottom row (row=7) to 700
        document.querySelectorAll('.box').forEach(box => {
            if (box.dataset.row === "1") {
                box.querySelector('.label').textContent = "100";
            }
            if (box.dataset.row === "2") {
                box.querySelector('.label').textContent = "200";
            }
            if (box.dataset.row === "3") {
                box.querySelector('.label').textContent = "300";
            }
            if (box.dataset.row === "4") {
                box.querySelector('.label').textContent = "400";
            }
            if (box.dataset.row === "5") {
                box.querySelector('.label').textContent = "500";
            }
            if (box.dataset.row === "6") {
                box.querySelector('.label').textContent = "600";
            }
            if (box.dataset.row === "7") {
                box.querySelector('.label').textContent = "700";
            }
        });


    })();
</script>
</body>
</html>
