<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji 100</title>
    <style>
        body { 
            background: #e0f2ff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-size: 3vw;
        }
        #closeTabBtn {
            position: fixed;
            right: 2vw;
            bottom: 2vw;
            font-size: 2vw;
            padding: 0.7vw 2vw;
            border-radius: 1vw;
            z-index: 10;
        }
        #fullscreenImg {
            max-width: 100vw;
            width: 100vw;
            height: auto;
            display: block;
            margin: 0 auto;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
        #answerBtn {
            position: fixed;
            left: 2vw;
            bottom: 2vw;
            font-size: 2vw;
            padding: 0.7vw 2vw;
            border-radius: 1vw;
            z-index: 10;
            background: #fff;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        #answerBox {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.5);
            padding: 3vw 5vw;
            border-radius: 2vw;
            box-shadow: 0 0 2vw rgba(0,0,0,0.15);
            z-index: 20;
            text-align: center;
        }
    </style>
</head>
<body>
    <img src="emoji/buuurecs.png" alt="" id="fullscreenImg">
    <button onclick="window.close()" id="closeTabBtn">Close Tab</button>
    <button id="answerBtn" onclick="showAnswer()">Show Answer</button>
    <div id="answerBox">
        <h1>Bámul, mint borjú az új kapura.</h1>
        <!-- You can replace "The Answer" with your actual answer -->
    </div>
    <script>
        function showAnswer() {
            document.getElementById('answerBox').style.display = 'block';
        }
    </script>
</body>
</html>
